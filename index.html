<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAOSS PAD V — Parameter Editor</title>
<style>
:root {
  --bg: #161616;
  --surface: #1f1f1f;
  --surface2: #2a2a2a;
  --border: #363636;
  --accent: #00d4aa;
  --accent-dim: #008a72;
  --text: #e0e0e0;
  --text-dim: #7a7a7a;
  --red: #ff5555;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px;
  min-height: 100vh;
}

/* ── Header ── */
#header {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
}
#header h1 { font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; }

.btn {
  padding: 5px 12px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface2); color: var(--text); cursor: pointer; font-size: 12px;
  transition: border-color .15s, color .15s, background .15s; white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.sel { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

#status { font-size: 12px; color: var(--text-dim); }
#status.ok  { color: var(--accent); }
#status.err { color: var(--red); }

.lbl { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

select.ctrl {
  background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  padding: 4px 8px; border-radius: 4px; font-size: 12px;
}
select.ctrl:focus { outline: 1px solid var(--accent); }

#out-wrap { display: none; align-items: center; gap: 6px; }
#out-sel  { min-width: 180px; }

/* ── Tabs ── */
#tabs {
  display: flex; gap: 2px; padding: 8px 16px 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.tab {
  padding: 7px 14px; cursor: pointer; border-radius: 4px 4px 0 0;
  color: var(--text-dim); font-size: 12px;
  border: 1px solid transparent; border-bottom: none; transition: color .15s;
}
.tab:hover { color: var(--text); }
.tab.active { background: var(--bg); color: var(--accent); border-color: var(--border); }

/* ── Library ── */
.lib-row { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid var(--border); }
.lib-info { flex:1; }
.lib-name { font-weight:bold; color:var(--text); font-size:13px; }
.lib-slots { font-size:11px; color:var(--text-dim); margin-top:3px; }
.lib-algo { background:var(--surface); padding:1px 6px; border-radius:3px; margin-right:4px; font-size:11px; }
.lib-btns { display:flex; gap:6px; }
.empty-msg { color:var(--text-dim); padding:24px 12px; font-size:12px; }

/* ── Content ── */
#content { padding: 16px; }
.panel { display: none; }
.panel.active { display: block; }

/* ── Row bars ── */
.bar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

/* ── Params grid ── */
.pgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px;
}

/* ── Param card ── */
.pcard {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px;
  transition: border-color .15s;
}
.pcard:hover { border-color: var(--accent-dim); }
.pcard .pname { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
.pcard .pdisplay { font-size: 10px; color: var(--accent-dim); margin-bottom: 7px; font-family: monospace; }

input[type=range] {
  width: 100%; height: 4px; cursor: pointer;
  accent-color: var(--accent);
}
.pval {
  text-align: right; font-size: 12px; font-weight: 600;
  color: var(--text); margin-top: 4px;
}

.pcard select {
  width: 100%; background: var(--surface2); color: var(--text);
  border: 1px solid var(--border); padding: 5px 6px;
  border-radius: 4px; font-size: 12px;
}
.pcard select:focus { outline: 1px solid var(--accent); }

.toggle {
  width: 100%; padding: 6px; border: 1px solid var(--border);
  border-radius: 4px; background: var(--surface2); color: var(--text-dim);
  cursor: pointer; font-size: 12px; font-weight: 600; text-align: center;
  transition: all .15s;
}
.toggle.on { background: var(--accent); color: #000; border-color: var(--accent); }

.pnote { font-size: 10px; color: var(--text-dim); margin-top: 5px; line-height: 1.4; }

/* ── Section divider ── */
.sdiv {
  grid-column: 1 / -1;
  font-size: 12px; font-weight: 700; color: var(--accent);
  padding: 10px 0 6px; border-bottom: 1px solid var(--border);
  margin-top: 6px;
}
.sdiv:first-child { margin-top: 0; }

.empty-msg { color: var(--text-dim); padding: 20px 0; }

/* ── Curve Modal ── */
#curve-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.78); z-index: 200;
  align-items: center; justify-content: center;
}
#curve-modal.open { display: flex; }
#curve-modal-inner {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; width: 380px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
}
#curve-modal-canvas {
  display: block; border: 1px solid var(--border);
  border-radius: 4px; cursor: crosshair; touch-action: none;
  user-select: none;
}
/* Help modal content styles */
#help-modal-body h2 { margin:0 0 14px; font-size:16px; color:var(--accent); }
#help-modal-body h3 { margin:16px 0 6px; font-size:13px; color:var(--text); border-bottom:1px solid var(--border); padding-bottom:4px; }
#help-modal-body p  { margin:6px 0; }
#help-modal-body ul, #help-modal-body ol { margin:6px 0 6px 20px; }
#help-modal-body li { margin:3px 0; }
#help-modal-body table { border-collapse:collapse; width:100%; margin:8px 0; font-size:12px; }
#help-modal-body th, #help-modal-body td { border:1px solid var(--border); padding:5px 10px; text-align:left; }
#help-modal-body th { background:var(--surface); color:var(--accent); font-weight:600; }
</style>
</head>

<body>

<!-- ═══ Header ═══ -->
<div id="header">
  <h1>KAOSS PAD V — Editor</h1>
  <button class="btn" onclick="connectMIDI()">Connect MIDI</button>
  <button class="btn" style="border-color:#ffaa00;color:#ffaa00" onclick="sendAll()">⬆ Send All</button>
  <button class="btn" style="border-color:#ffcc44;color:#ffcc44" onclick="sendOneTab()">⬆ Send 1 Tab</button>
  <div id="out-wrap">
    <span class="lbl">OUT:</span>
    <select class="ctrl" id="out-sel" onchange="selectOutput()"></select>
  </div>
  <span id="status">Not connected</span>
  <span id="dsp-badge" style="margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;white-space:nowrap">
    <span class="lbl">DSP:</span>
    <span id="dsp-val" style="font-weight:700;color:var(--accent);min-width:3em;text-align:right">0%</span>
    <span style="display:inline-block;width:80px;height:7px;background:var(--surface2);border-radius:3px;overflow:hidden;border:1px solid var(--border)">
      <span id="dsp-bar" style="display:block;height:100%;width:0%;background:var(--accent);transition:width .25s,background .25s;border-radius:3px"></span>
    </span>
  </span>
  <!-- Help dropdown -->
  <div id="help-wrap" style="position:relative;margin-left:8px">
    <button class="btn" id="help-btn" onclick="toggleHelp(event)"
      style="border-color:#aaa;color:#aaa">Help ▾</button>
    <div id="help-menu" style="display:none;position:absolute;right:0;top:calc(100% + 4px);
      background:var(--surface2);border:1px solid var(--border);border-radius:6px;
      min-width:160px;z-index:200;box-shadow:0 4px 16px #0008;overflow:hidden">
    </div>
  </div>

  <span class="lbl">MIDI Ch:</span>
  <select class="ctrl" id="midi-ch" onchange="onChChange()">
    <option value="0">1</option><option value="1">2</option><option value="2">3</option>
    <option value="3">4</option><option value="4">5</option><option value="5">6</option>
    <option value="6">7</option><option value="7">8</option><option value="8">9</option>
    <option value="9">10</option><option value="10">11</option><option value="11">12</option>
    <option value="12">13</option><option value="13">14</option><option value="14">15</option>
    <option value="15">16</option>
  </select>
</div>

<!-- ═══ Tabs ═══ -->
<div id="tabs">
  <div class="tab active"  onclick="showTab('fx')">FX Slots</div>
  <div class="tab"         onclick="showTab('lfo')">LFO</div>
  <div class="tab"         onclick="showTab('eg')">EG</div>
  <div class="tab"         onclick="showTab('ef')">EF (Follower)</div>
  <div class="tab"         onclick="showTab('mixer')">Mixer</div>
  <div class="tab"         onclick="showTab('vp')">Virtual Patch</div>
  <div class="tab"         onclick="showTab('lib')">Library</div>
</div>

<!-- ═══ Debug bar ═══ -->
<div id="debugbar" style="
  background:#111; border-bottom:1px solid #333; padding:8px 16px;
  display:flex; gap:10px; align-items:center; flex-wrap:wrap; font-size:12px;">
  <button class="btn" onclick="sendInquiry()">🔍 Device Inquiry</button>
  <button class="btn" onclick="sendTestCC()">🎛 Test CC#1 val=64</button>
  <span style="color:#555">Last TX:</span>
  <code id="tx-log" style="color:#00d4aa; font-size:11px; word-break:break-all; flex:1">—</code>
</div>

<!-- ═══ Content ═══ -->
<div id="content">

  <!-- FX Panel -->
  <div class="panel active" id="panel-fx">
    <div class="bar">
      <span class="lbl">Slot:</span>
      <button class="btn sel" onclick="selSlot(0,this)">FX 1</button>
      <button class="btn"     onclick="selSlot(1,this)">FX 2</button>
      <button class="btn"     onclick="selSlot(2,this)">FX 3</button>
      <button class="btn"     onclick="selSlot(3,this)">FX 4</button>
      <button class="btn"     onclick="selSlot(4,this)">FX 5</button>
    </div>
    <div class="bar">
      <span class="lbl">Algorithm:</span>
      <select class="ctrl" id="algo-sel" style="min-width:220px" onchange="selAlgo(parseInt(this.value))"></select>
    </div>
    <div id="fx-params" class="pgrid"></div>
  </div>

  <!-- LFO Panel -->
  <div class="panel" id="panel-lfo">
    <div id="lfo-params" class="pgrid"></div>
  </div>

  <!-- EG Panel -->
  <div class="panel" id="panel-eg">
    <div id="eg-params" class="pgrid"></div>
  </div>

  <!-- EF Panel -->
  <div class="panel" id="panel-ef">
    <div id="ef-params" class="pgrid"></div>
  </div>

  <!-- Mixer Panel -->
  <div class="panel" id="panel-mixer">
    <div id="mixer-params" class="pgrid"></div>
  </div>

  <!-- Virtual Patch Panel -->
  <div class="panel" id="panel-vp">
    <div id="vp-params" class="pgrid"></div>
  </div>

  <!-- Library Panel -->
  <div class="panel" id="panel-lib">
    <div class="bar">
      <span class="lbl">Import:</span>
      <input type="file" id="lib-file-input" accept=".preset" multiple
        style="display:none" onchange="importPresetFiles(this.files)">
      <button class="btn" onclick="document.getElementById('lib-file-input').click()">
        + Import .preset files
      </button>
      <span id="lib-status" style="font-size:11px;color:var(--text-dim)"></span>
    </div>
    <div id="lib-list"></div>
  </div>

</div><!-- #content -->

<script>

// Shared enum lists
// ═══════════════════════════════════════════════════════════

// 0=Off, 1-4=LFO1-4, 5-8=EG1-4, 9-10=EF1-2, 11-16=X1/Y1/Touch1/X2/Y2/Touch2
const VP_SOURCE = [
  'Off',

// ═══════════════════════════════════════════════════════════

  ({ name, disp, type:'range', dMin, dMax, iMin, iMax, note });

  ({ name, disp, type:'select', opts, note });
const T = (name, disp, note='') =>
  ({ name, disp, type:'toggle', note });

// Algorithm names
// ═══════════════════════════════════════════════════════════

  'No Effect','Analog Osc','Sample Osc','Parametric EQ','Compressor',
  'Filter','Isolator','Graphic EQ','Distortion','Decimator',
  'Delay','Tape Echo','Chorus','Flanger','Phaser',
  'Tremolo','Ring Mod','Pitch Shifter','Grain Shifter','Looper',
  'Vinyl Break','Reverb','Shimmer','Early Reflection','IR Loader',

// ═══════════════════════════════════════════════════════════

function getDspForSlot(slot) {
  return DSP_USAGE_BASE[algoPerSlot[slot]] ?? 0;
}

function getDspForAlgo(algo, slot) {
  return DSP_USAGE_BASE[algo] ?? 0;
}

function getTotalDsp() {
  return [0, 1, 2, 3, 4].reduce((sum, s) => sum + getDspForSlot(s), 0);
}

function updateDspDisplay() {
  const total = getTotalDsp();
  const color = total >= DSP_LIMIT ? 'var(--red)' : total > 85 ? '#ffaa00' : 'var(--accent)';
  const valEl = document.getElementById('dsp-val');
  const barEl = document.getElementById('dsp-bar');
  if (valEl) { valEl.textContent = `${total}%`; valEl.style.color = color; }
  if (barEl) { barEl.style.width = `${Math.min(total, DSP_LIMIT)}%`; barEl.style.background = color; }
  updateAlgoSelectorRestrictions();
}

function updateAlgoSelectorRestrictions() {
  // FX tab algo selector
  const fxSel = document.getElementById('algo-sel');
  if (fxSel) {
    const other = [0,1,2,3,4].filter(s => s !== curSlot)
      .reduce((sum, s) => sum + getDspForSlot(s), 0);
    Array.from(fxSel.options).forEach(opt => {
      const ai = parseInt(opt.value);
      const d  = getDspForAlgo(ai, curSlot);
      const over = other + d >= DSP_LIMIT;
      opt.disabled = over;
      opt.style.color = over ? 'var(--text-dim)' : '';
      opt.title = `${d}% DSP` + (over ? ` — total ${other + d}% exceeds ${DSP_LIMIT}%` : '');
    });
  }
  // Mixer Effect Type selectors (mixer-algo-0 ~ mixer-algo-4)
  for (let slot = 0; slot < 5; slot++) {
    const mSel = document.getElementById(`mixer-algo-${slot}`);
    if (!mSel) continue;
    const other = [0,1,2,3,4].filter(s => s !== slot)
      .reduce((sum, s) => sum + getDspForSlot(s), 0);
    Array.from(mSel.options).forEach(opt => {
      const ai = parseInt(opt.value);
      const d  = getDspForAlgo(ai, slot);
      const over = other + d >= DSP_LIMIT;
      opt.disabled = over;
      opt.style.color = over ? 'var(--text-dim)' : '';
      opt.title = `${d}% DSP` + (over ? ` — total ${other + d}% exceeds ${DSP_LIMIT}%` : '');
    });
  }

}

async function connectMIDI() {
  try {
    midiAccess = await navigator.requestMIDIAccess({ sysex: true });
    midiAccess.onstatechange = populateOutputs;
    populateOutputs();
    setStatus('ok', 'MIDI OK — select output');
    document.getElementById('out-wrap').style.display = 'flex';
  } catch(e) {
    setStatus('err', 'MIDI denied: ' + e.message);
  }
}

function populateOutputs() {
  const sel = document.getElementById('out-sel');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— select output —</option>';
  for (const [id, port] of midiAccess.outputs) {
    const o = document.createElement('option');
    o.value = id; o.textContent = port.name;
    if (id === prev) o.selected = true;
    sel.appendChild(o);
  }
  if (midiAccess.outputs.size === 1) { sel.selectedIndex = 1; selectOutput(); }

  // Wire up all inputs for monitoring
  for (const [, port] of midiAccess.inputs) {
    port.onmidimessage = (ev) => {
      const hex = Array.from(ev.data)
        .map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
    };
  }
}

function selectOutput() {
  const id = document.getElementById('out-sel').value;
  midiOutput = id ? midiAccess.outputs.get(id) : null;
  if (midiOutput) setStatus('ok', '✓ ' + midiOutput.name);
}

function setStatus(cls, msg) {

// ── Float → 5 MIDI bytes (32-bit IEEE 754, big-endian, 7-bit encoding) ──
function floatTo5(v) {
  const buf = new ArrayBuffer(4);
  new DataView(buf).setFloat32(0, v, false);
  const u = new DataView(buf).getUint32(0, false);
  return [
    (u >>> 25) & 0x7F,
    (u >>> 18) & 0x7F,
    (u >>> 11) & 0x7F,
    (u >>>  4) & 0x7F,
    ((u & 0x0F) << 3) & 0x7F
  ];
}

// KORG 7-bit decode: 8 MIDI bytes → 7 data bytes (MSBs in first byte)  [kept for future use]
function decode7bit(encoded) {
  const out = [];
  for (let i = 0; i < encoded.length; i += 8) {
    const msbs = encoded[i];
    for (let j = 1; j <= 7 && (i + j) < encoded.length; j++) {
      out.push(encoded[i + j] | (((msbs >> (j - 1)) & 1) << 7));
    }
  }
  return out;
}



function kpvHdr() {
  return [0xF0, 0x42, 0x30 | getMidiCh(), 0x00, 0x01, 0x79];
}

// ── TX log ──
function logTX(bytes) {
  document.getElementById('tx-log').textContent =
    Array.from(bytes).map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
}

// VE Mapper Change  (Func 72)
// mode: 0=Remove, 1=Move, 2=RemoveAll, 3=Init, 7F=Add
// mapperIdx: 0~31 (VP Patch 0~31)
// pointIdx:  0~31
function sendVEMapper(mode, mapperIdx, pointIdx, inVal, outVal) {
  if (!midiOutput) return;
  const msg = [
    ...kpvHdr(), 0x72,
    mode & 0x7F,
    mapperIdx & 0x7F,
    pointIdx  & 0x7F,
    ...floatTo5(inVal),
    ...floatTo5(outVal),
    0xF7
  ];
  midiOutput.send(msg);
  logTX(msg);
}

// VE Parameter Change  (Func 71)
// index: 21-bit → 3 × 7-bit bytes
function sendVE(index, floatVal) {
  if (!midiOutput) return;
  const msg = [
    ...kpvHdr(), 0x71,
    (index >> 14) & 0x7F,
    (index >>  7) & 0x7F,
     index        & 0x7F,
    ...floatTo5(floatVal),
    0xF7
  ];
  midiOutput.send(msg);
  logTX(msg);
}

// ── Debug helpers ──
function sendInquiry() {
  if (!midiOutput) { alert('MIDIポートを選択してください'); return; }
  // Universal Device Inquiry (any channel)
  const msg = [0xF0, 0x7E, 0x7F, 0x06, 0x01, 0xF7];
  midiOutput.send(msg);
  logTX(msg);
}

function sendTestCC() {
  if (!midiOutput) { alert('MIDIポートを選択してください'); return; }
  const ch = getMidiCh();
  const msg = [0xB0 | ch, 0x01, 64];  // CC#1 = Mod Wheel
  midiOutput.send(msg);
  logTX(msg);
}

// ── Index calculators ──
const idxFX    = (slot, algoId, p) => 1000 + 3200*slot + 64*ALGO_TO_BLOCK[algoId] + p;
const idxLFO   = (n, p) => 100 + 9*n + p;
const idxEG    = (n, p) => 200 + 4*n + p;
const idxEF    = (n, p) => 300 + 6*n + p;
const idxMixer = (n, p) => 400 + 9*n + p;
const idxVP    = (n, p) => 500 + 5*n + p;

// ── Display → internal float ──
function d2i(dispVal, p) {
  if (p.type !== 'range') return dispVal;
  const { dMin, dMax, iMin, iMax } = p;
  if (dMax === dMin) return iMin;
  return iMin + ((dispVal - dMin) / (dMax - dMin)) * (iMax - iMin);
}

// Append param cards to an existing container element (does not reset innerHTML)
function appendParamsToEl(params, c, indexFn, stateGet=null, stateSet=null) {
  params.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'pcard';
    card.dataset.paramName = p.name;

    const nameEl = document.createElement('div');
    nameEl.className = 'pname';
    nameEl.textContent = `${i+1}.  ${p.name}`;
    card.appendChild(nameEl);

    const dispEl = document.createElement('div');
    dispEl.className = 'pdisplay';
    dispEl.textContent = p.disp;
    card.appendChild(dispEl);

    const veIdx = indexFn(i);

    if (p.type === 'range') {
      const hasDecimals = (p.dMin % 1 !== 0) || (p.dMax % 1 !== 0) ||
                          (Math.abs(p.dMax - p.dMin) < 5);
      const step  = hasDecimals ? 0.01 : 1;
      const defV  = Math.min(Math.max(0, p.dMin), p.dMax);
      const initV = stateGet ? (stateGet(i) ?? defV) : defV;

      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min = p.dMin; slider.max = p.dMax;
      slider.step = step;  slider.value = initV;
      slider.dataset.veIdx  = veIdx;
      slider.dataset.iMin   = p.iMin;
      slider.dataset.iMax   = p.iMax;
      slider.dataset.dMin   = p.dMin;
      slider.dataset.dMax   = p.dMax;

      const valEl = document.createElement('div');
      valEl.className = 'pval';
      valEl.textContent = fmtVal(initV, step);

      slider.oninput = () => {
        const dv = parseFloat(slider.value);
        valEl.textContent = fmtVal(dv, step);
        stateSet?.(i, dv);
        sendVE(veIdx, d2i(dv, p));
      };
      card.appendChild(slider);
      card.appendChild(valEl);

    } else if (p.type === 'select') {
      const initV = stateGet ? (stateGet(i) ?? 0) : 0;
      const sel = document.createElement('select');
      sel.dataset.veIdx = veIdx;
      (p.opts || []).forEach((opt, oi) => {
        const o = document.createElement('option');
        o.value = oi; o.textContent = opt;
        sel.appendChild(o);
      });
      sel.value = initV;
      sel.onchange = () => {
        const v = parseInt(sel.value);
        stateSet?.(i, v);
        sendVE(veIdx, v);
      };
      card.appendChild(sel);

    } else if (p.type === 'toggle') {
      const initV = stateGet ? (stateGet(i) ?? false) : false;
      const btn = document.createElement('div');
      btn.className = 'toggle' + (initV ? ' on' : '');
      btn.textContent = initV ? 'ON' : 'OFF';
      btn.dataset.veIdx = veIdx;
      btn.onclick = () => {
        const on = btn.classList.toggle('on');
        btn.textContent = on ? 'ON' : 'OFF';
        stateSet?.(i, on);
        sendVE(veIdx, on ? 1.0 : 0.0);
      };
      card.appendChild(btn);

    } else if (p.type === 'dest') {
      const mods = buildDestModules();

      const modSel = document.createElement('select');
      modSel.style.cssText = 'width:100%;margin-bottom:5px;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:4px 6px;border-radius:4px;font-size:12px';

      const parSel = document.createElement('select');
      parSel.style.cssText = 'width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:4px 6px;border-radius:4px;font-size:12px';

      const idxEl = document.createElement('div');
      idxEl.style.cssText = 'font-size:10px;color:var(--text-dim);margin-top:4px;text-align:right';

      mods.forEach((mod, mi) => {
        const o = document.createElement('option');
        o.value = mi;
        o.textContent = mod.label;
        modSel.appendChild(o);
      });

      const initDest = stateGet ? (stateGet(i) ?? {modIdx:0, parIdx:0}) : {modIdx:0, parIdx:0};

      function populateParSel(targetParIdx = 0, noSend = false) {
        const entries = mods[parseInt(modSel.value)].entries;
        parSel.innerHTML = '';
        if (entries.length === 0) {
          const o = document.createElement('option'); o.textContent = '(no params)'; parSel.appendChild(o);
        } else {
          entries.forEach((e, ei) => {
            const o = document.createElement('option'); o.value = ei; o.textContent = e.name; parSel.appendChild(o);
          });
        }
        parSel.value = targetParIdx;
        onDestChange(noSend);
      }

      function onDestChange(noSend = false) {
        const entries = mods[parseInt(modSel.value)].entries;
        const pi = parseInt(parSel.value) || 0;
        const destIdx = entries[pi] ? entries[pi].idx : 0;
        idxEl.textContent = `VE idx: ${destIdx}`;
        modSel.dataset.veIdx = veIdx;
        modSel.dataset.destComputed = destIdx;
        stateSet?.(i, {modIdx: parseInt(modSel.value), parIdx: parseInt(parSel.value)});
        if (!noSend) sendVE(veIdx, destIdx);
      }

      modSel.onchange = () => populateParSel(0);
      parSel.onchange = () => onDestChange();
      // Restore saved state — suppress send during initialization
      modSel.value = initDest.modIdx;
      populateParSel(initDest.parIdx, true);

      card.appendChild(modSel);
      card.appendChild(parSel);
      card.appendChild(idxEl);
    }

    if (p.note) {
      const n = document.createElement('div');
      n.className = 'pnote'; n.textContent = p.note;
      card.appendChild(n);
    }

    c.appendChild(card);
  });
}

function renderParams(params, containerId, indexFn, stateGet=null, stateSet=null) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  if (!params || params.length === 0) {
    c.innerHTML = '<p class="empty-msg">No parameters for this selection.</p>';
    return;
  }
  appendParamsToEl(params, c, indexFn, stateGet, stateSet);
}

function fmtVal(v, step) {
  return step < 1 ? v.toFixed(2) : Math.round(v).toString();
}

// Called when Mixer Effect Type changes

// Build destination module list matching device VP_DEST_CAT order (13 modules):
//   FX1~5, LFO1~4, EG (merged), EF (merged), Mixer (merged), VP (merged)
function buildDestModules() {
  const mods = [];

  // FX Slot 1~5 — params depend on the algorithm currently in each slot
  for (let s = 0; s < 5; s++) {
    const algo = algoPerSlot[s];
    const params = ALGO_PARAMS[algo] || [];
    if (params.length === 0) {
      mods.push({ label: `FX${s+1} — No Effect`, entries: [] });
    } else {
      mods.push({
        label: `FX${s+1} — ${ALGO_NAMES[algo]}`,
        entries: params.map((p, pi) => ({
          name: p.name,
          idx:  idxFX(s, algo, pi)
        }))
      });
    }
  }

  // LFO 1~4 — individual (device shows each separately)
  for (let n = 0; n < 4; n++) {
    mods.push({
      label: `LFO ${n+1}`,
      entries: LFO_PARAMS.map((p, pi) => ({ name: p.name, idx: idxLFO(n, pi) }))
    });
  }

  // EG — single merged category (EG1~4 × 4 params = 16 entries)
  {
    const entries = [];
    for (let n = 0; n < 4; n++)
      EG_PARAMS.forEach((p, pi) =>
        entries.push({ name: `EG${n+1} ${p.name}`, idx: idxEG(n, pi) }));
    mods.push({ label: 'EG', entries });
  }

  // EF — single merged category (EF1~2 × 6 params = 12 entries)
  {
    const entries = [];
    for (let n = 0; n < 2; n++)
      EF_PARAMS.forEach((p, pi) =>
        entries.push({ name: `EF${n+1} ${p.name}`, idx: idxEF(n, pi) }));
    mods.push({ label: 'EF', entries });
  }

  // Mixer — single merged category (Slot1~5 × 9 params = 45 entries)
  {
    const mixNames = [
      'Effect Type','Audio In',
      'FX1→this','FX2→this','FX3→this','FX4→this','FX5→this',
      'Out Level','Out Pan'
    ];
    const entries = [];
    for (let n = 0; n < 5; n++)
      mixNames.forEach((name, pi) =>
        entries.push({ name: `FX${n+1} ${name}`, idx: idxMixer(n, pi) }));
    mods.push({ label: 'Mixer', entries });
  }

  // VP — single merged category (Patch1~32 × 5 params = 160 entries)
  {
    const vpNames = ['On/Off', 'Source', 'Destination', 'Intensity', 'Polarity'];
    const entries = [];
    for (let n = 0; n < 32; n++)
      vpNames.forEach((name, pi) =>
        entries.push({ name: `Patch${n+1} ${name}`, idx: idxVP(n, pi) }));
    mods.push({ label: 'VP', entries });
  }

  return mods;
}

function renderFX() {

    (i, v) => { st[i] = v; updateDspDisplay(); }
  );
}

// Render params directly into a given container element (no innerHTML reset)
function renderParamsInto(params, container, indexFn) {
  params.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'pcard';

    const nameEl = document.createElement('div');
    nameEl.className = 'pname';
    nameEl.textContent = `${i+1}.  ${p.name}`;
    card.appendChild(nameEl);

    if (p.type === 'range') {
      const step = (p.dMin % 1 !== 0 || p.dMax <= 1) ? 0.01 : 1;
      const defV = Math.min(Math.max(0, p.dMin), p.dMax);
      const slider = document.createElement('input');
      slider.type = 'range'; slider.min = p.dMin; slider.max = p.dMax;
      slider.step = step; slider.value = defV;
      const valEl = document.createElement('div');
      valEl.className = 'pval'; valEl.textContent = fmtVal(defV, step);
      slider.oninput = () => {
        const dv = parseFloat(slider.value);
        valEl.textContent = fmtVal(dv, step);
        sendVE(indexFn(i), d2i(dv, p));
      };
      card.appendChild(slider); card.appendChild(valEl);

    } else if (p.type === 'select') {
      const sel = document.createElement('select');
      (p.opts || []).forEach((opt, oi) => {
        const o = document.createElement('option');
        o.value = oi; o.textContent = opt; sel.appendChild(o);
      });
      sel.onchange = () => sendVE(indexFn(i), parseInt(sel.value));
      card.appendChild(sel);
    }

    container.appendChild(card);
  });
}

// Send params from a state array (skips null = never-edited entries)
function sendParamsFromState(params, indexFn, state) {
  if (!params || !state) return 0;
  let count = 0;
  params.forEach((p, i) => {
    const sv = state[i];
    if (sv === null || sv === undefined) return;
    const veIdx = indexFn(i);
    if (p.type === 'range') {
      sendVE(veIdx, d2i(sv, p));
    } else if (p.type === 'select') {
      sendVE(veIdx, sv);
    } else if (p.type === 'toggle') {
      sendVE(veIdx, sv ? 1.0 : 0.0);
    } else if (p.type === 'dest') {
      const mods = buildDestModules();
      const entries = (mods[sv.modIdx] || {}).entries || [];
      const destIdx = (entries[sv.parIdx] || {}).idx ?? 0;
      sendVE(veIdx, destIdx);
    }
    count++;
  });
  return count;
}

// Send controls inside a DOM scope element
function sendDomControls(scope) {
  let count = 0;
  scope.querySelectorAll('input[type=range][data-ve-idx]').forEach(el => {
    const idx = parseInt(el.dataset.veIdx);
    const dv  = parseFloat(el.value);
    const iv  = d2i(dv, {
      type:'range',
      dMin: +el.dataset.dMin, dMax: +el.dataset.dMax,
      iMin: +el.dataset.iMin, iMax: +el.dataset.iMax
    });
    sendVE(idx, iv);
    count++;
  });
  scope.querySelectorAll('select[data-ve-idx]:not([data-dest-computed])').forEach(el => {
    sendVE(parseInt(el.dataset.veIdx), parseInt(el.value));
    count++;
  });
  scope.querySelectorAll('.toggle[data-ve-idx]').forEach(el => {
    sendVE(parseInt(el.dataset.veIdx), el.classList.contains('on') ? 1.0 : 0.0);
    count++;
  });
  scope.querySelectorAll('select[data-dest-computed]').forEach(el => {
    sendVE(parseInt(el.dataset.veIdx), parseInt(el.dataset.destComputed));
    count++;
  });
  return count;
}

// SEND 1 TAB — active panel only (what you see)
function sendOneTab() {
  if (!midiOutput) { alert('MIDIポートを選択してください'); return; }
  const panel = document.querySelector('.panel.active');
  if (!panel) return;
  const count = sendDomControls(panel);
  document.getElementById('tx-log').textContent = `[Send Tab] ${count} params sent`;
}

// SEND ALL — iterate state arrays + EG/Mixer DOM
function sendAll() {
  if (!midiOutput) { alert('MIDIポートを選択してください'); return; }
  let count = 0;

  // FX: all edited slot × algo combinations
  for (let slot = 0; slot < 5; slot++) {
    for (const [algoId, st] of Object.entries(fxState[slot])) {
      count += sendParamsFromState(ALGO_PARAMS[+algoId], (i) => idxFX(slot, +algoId, i), st);
    }
  }

  // LFO: all 4 units
  for (let n = 0; n < 4; n++) {
    count += sendParamsFromState(LFO_PARAMS, (i) => idxLFO(n, i), lfoState[n]);
  }

  // EF: all 2 units
  for (let n = 0; n < 2; n++) {
    count += sendParamsFromState(EF_PARAMS, (i) => idxEF(n, i), efState[n]);
  }

  // VP: all 32 patches
  for (let n = 0; n < 32; n++) {
    count += sendParamsFromState(VP_PARAMS, (i) => idxVP(n, i), vpState[n]);
  }

  // EG: 4 units from state
  for (let n = 0; n < 4; n++)
    count += sendParamsFromState(EG_PARAMS, (i) => idxEG(n, i), egState[n]);

  // Mixer: Effect Type (p0) from algoPerSlot + p1~8 from state
  for (let n = 0; n < 5; n++) {
    sendVE(idxMixer(n, 0), algoPerSlot[n]); count++;
    count += sendParamsFromState(MIXER_PARAMS, (i) => idxMixer(n, i + 1), mixerState[n]);
  }

  document.getElementById('tx-log').textContent = `[Send All] ${count} params sent`;
}

// ═══════════════════════════════════════════════════════════
// VP Curve / Mapper
// ═══════════════════════════════════════════════════════════

// Mapper state: 32 patches × array of [inVal, outVal] pairs (always sorted by inVal)
const mapperState = Array.from({length: 32}, () => [[0, 0], [1, 1]]);

// ── Draw curve on any canvas ──
function drawCurve(canvas, points, opts = {}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const PAD = opts.pad ?? 8;
  const uw = W - 2*PAD, uh = H - 2*PAD;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);
  // Grid
  ctx.strokeStyle = '#2e2e2e';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const gx = PAD + i*uw/4, gy = PAD + i*uh/4;
    ctx.beginPath(); ctx.moveTo(gx, PAD); ctx.lineTo(gx, PAD+uh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD, gy); ctx.lineTo(PAD+uw, gy); ctx.stroke();
  }
  if (!points.length) return;
  const sorted = [...points].sort((a, b) => a[0] - b[0]);
  const px = v => PAD + v * uw;
  const py = v => PAD + (1 - v) * uh;
  // Curve line
  ctx.strokeStyle = '#00d4aa';
  ctx.lineWidth = opts.mini ? 1.5 : 2;
  ctx.beginPath();
  sorted.forEach(([iv, ov], i) =>
    i === 0 ? ctx.moveTo(px(iv), py(ov)) : ctx.lineTo(px(iv), py(ov)));
  ctx.stroke();
  // Control points
  const r = opts.mini ? 2.5 : 5;
  sorted.forEach(([iv, ov], i) => {
    ctx.beginPath();
    ctx.arc(px(iv), py(ov), r, 0, Math.PI * 2);
    ctx.fillStyle = (i === opts.activeIdx) ? '#ffcc00' : '#e0e0e0';
    ctx.fill();
  });
}

// ── Modal state ──
let curveEditPatch = -1;
let curveDragPt    = null;   // reference to the [in, out] pair being dragged
let curveDragging  = false;
const CURVE_PAD    = 20;

function openCurveModal(n) {
  curveEditPatch = n;
  curveDragPt = null; curveDragging = false;
  document.getElementById('curve-modal-title').textContent = `Patch ${n + 1} — Curve`;
  document.getElementById('curve-modal').classList.add('open');
  redrawModalCanvas();
}

function closeCurveModal() {
  document.getElementById('curve-modal').classList.remove('open');
  curveEditPatch = -1; curveDragPt = null;
}

function redrawModalCanvas() {
  const canvas = document.getElementById('curve-modal-canvas');
  const sorted = [...mapperState[curveEditPatch]].sort((a, b) => a[0] - b[0]);
  const ai = curveDragPt ? sorted.indexOf(curveDragPt) : -1;
  drawCurve(canvas, sorted, {pad: CURVE_PAD, activeIdx: ai});
}

function curvePxToVal(e, canvas) {
  const r = canvas.getBoundingClientRect();
  const cx = e.clientX - r.left, cy = e.clientY - r.top;
  const uw = canvas.width  - 2*CURVE_PAD;
  const uh = canvas.height - 2*CURVE_PAD;
  return {
    iv: Math.max(0, Math.min(1, (cx - CURVE_PAD) / uw)),
    ov: Math.max(0, Math.min(1, 1 - (cy - CURVE_PAD) / uh)),
    cx, cy,
  };
}

function curveHitTest(cx, cy, canvas) {
  const pts = mapperState[curveEditPatch];
  const uw  = canvas.width  - 2*CURVE_PAD;
  const uh  = canvas.height - 2*CURVE_PAD;
  for (const pt of pts) {
    const ppx = CURVE_PAD + pt[0] * uw;
    const ppy = CURVE_PAD + (1 - pt[1]) * uh;
    if (Math.hypot(cx - ppx, cy - ppy) <= 10) return pt;
  }
  return null;
}

async function sendMapperFull(n) {
  if (!midiOutput) return;
  sendVEMapper(0x02, n, 0, 0, 0);  // RemoveAll
  await new Promise(r => setTimeout(r, 10));
  const pts = [...mapperState[n]].sort((a, b) => a[0] - b[0]);
  for (let i = 0; i < pts.length; i++) {
    sendVEMapper(0x7F, n, i, pts[i][0], pts[i][1]);
    if (i < pts.length - 1) await new Promise(r => setTimeout(r, 10));
  }
}

function curveCmdInit() {
  if (curveEditPatch < 0) return;
  sendVEMapper(0x03, curveEditPatch, 0, 0, 0);
  mapperState[curveEditPatch] = [[0, 0], [1, 1]];
  refreshMiniCurve(curveEditPatch);
  redrawModalCanvas();
}

function curveCmdClear() {
  if (curveEditPatch < 0) return;
  sendVEMapper(0x02, curveEditPatch, 0, 0, 0);
  mapperState[curveEditPatch] = [];
  refreshMiniCurve(curveEditPatch);
  redrawModalCanvas();
}

// ── Modal canvas event handlers ──
function curveMousedown(e) {
  if (curveEditPatch < 0 || e.button !== 0) return;
  const canvas = document.getElementById('curve-modal-canvas');
  const {iv, ov, cx, cy} = curvePxToVal(e, canvas);
  const hit = curveHitTest(cx, cy, canvas);
  if (hit) {
    curveDragPt = hit; curveDragging = false;
  } else {
    const newPt = [iv, ov];
    mapperState[curveEditPatch].push(newPt);
    mapperState[curveEditPatch].sort((a, b) => a[0] - b[0]);
    sendMapperFull(curveEditPatch);
    refreshMiniCurve(curveEditPatch);
    redrawModalCanvas();
  }
}

function curveMousemove(e) {
  if (!curveDragPt) return;
  const canvas = document.getElementById('curve-modal-canvas');
  const {iv, ov} = curvePxToVal(e, canvas);
  curveDragPt[0] = iv;
  curveDragPt[1] = ov;
  curveDragging = true;
  redrawModalCanvas();
}

function curveMouseup(e) {
  if (curveDragPt && curveDragging) {
    mapperState[curveEditPatch].sort((a, b) => a[0] - b[0]);
    sendMapperFull(curveEditPatch);
    refreshMiniCurve(curveEditPatch);
    redrawModalCanvas();
  }
  curveDragPt = null; curveDragging = false;
}

function curveContextmenu(e) {
  e.preventDefault();
  if (curveEditPatch < 0) return;
  const canvas = document.getElementById('curve-modal-canvas');
  const r = canvas.getBoundingClientRect();
  const hit = curveHitTest(e.clientX - r.left, e.clientY - r.top, canvas);
  if (hit) {
    const pts = mapperState[curveEditPatch];
    pts.splice(pts.indexOf(hit), 1);
    sendMapperFull(curveEditPatch);
    refreshMiniCurve(curveEditPatch);
    redrawModalCanvas();
  }
}

// ═══════════════════════════════════════════════════════════
// Librarian
// ═══════════════════════════════════════════════════════════

// Inverse of d2i: internal float → display value
function i2d(iv, p) {
  if (!p || p.type !== 'range') return iv;
  const { dMin, dMax, iMin, iMax } = p;
  if (iMax === iMin) return dMin;
  return dMin + (iv - iMin) / (iMax - iMin) * (dMax - dMin);
}

// VE index → VP destination {modIdx, parIdx}
function veIdxToDestObj(veIdx) {
  const mods = buildDestModules();
  for (let mi = 0; mi < mods.length; mi++) {
    const entries = mods[mi].entries || [];
    for (let pi = 0; pi < entries.length; pi++) {
      if (entries[pi].idx === veIdx) return { modIdx: mi, parIdx: pi };
    }
  }
  return { modIdx: 0, parIdx: 0 };
}

// Parse .preset binary → preset object
function parsePreset(buf, filename) {
  if (buf.byteLength < 10085) return null;
  const v = new DataView(buf);
  const f = [];
  for (let i = 0; i < 2518; i++) f.push(v.getFloat32(13 + i * 4, true));

  // Mixer starts at float[151] (float[150] is a separator = 0.0).
  // Effect Type (p0) of each Mixer slot = algo ID for that FX slot.
  const algos = Array.from({length: 5}, (_, s) => Math.round(f[151 + s * 9]));

  return {
    filename,
    algos,
    fx   : Array.from({length:  5}, (_, s) => f.slice(s*30,      s*30+30)),
    mixer: Array.from({length:  5}, (_, u) => f.slice(151+u*9,   151+u*9+9)),
    lfo  : Array.from({length:  4}, (_, u) => f.slice(196+u*9,   196+u*9+9)),
    eg   : Array.from({length:  4}, (_, u) => f.slice(232+u*4,   232+u*4+4)),
    ef   : Array.from({length:  2}, (_, u) => f.slice(248+u*6,   248+u*6+6)),
    vp   : Array.from({length: 32}, (_, n) => f.slice(260+n*5,   260+n*5+5)),
    // VP Mapper Structures: byte offset 1693, 32 mappers × 260 bytes each
    // Each mapper: 32 points × 8 bytes (InValue float32LE + OutValue float32LE)
    //              + 1 byte PointCount + 3 bytes Reserved
    mapper: Array.from({length: 32}, (_, n) => {
      const base = 1693 + n * 260;  // byte offset in file
      const count = new Uint8Array(buf)[base + 256];
      const points = [];
      for (let p = 0; p < count && p < 32; p++) {
        const off = base + p * 8;
        points.push([v.getFloat32(off, true), v.getFloat32(off + 4, true)]);
      }
      return points;  // array of [inVal, outVal] pairs
    }),
  };
}

// Load preset into editor state + send to device
function loadPreset(preset) {
  if (!preset) return;

  // FX
  for (let s = 0; s < 5; s++) {
    const algo = preset.algos[s];
    algoPerSlot[s] = algo;
    if (!fxState[s][algo]) fxState[s][algo] = [];
    (ALGO_PARAMS[algo] || []).forEach((p, i) => {
      if (i < 30) fxState[s][algo][i] = i2d(preset.fx[s][i], p);
    });
  }
  // LFO
  for (let u = 0; u < 4; u++)
    LFO_PARAMS.forEach((p, i) => { lfoState[u][i] = i2d(preset.lfo[u][i], p); });
  // EG
  for (let u = 0; u < 4; u++)
    EG_PARAMS.forEach((p, i) => { egState[u][i] = i2d(preset.eg[u][i], p); });
  // EF
  for (let u = 0; u < 2; u++)
    EF_PARAMS.forEach((p, i) => { efState[u][i] = i2d(preset.ef[u][i], p); });
  // Mixer p1~8
  for (let u = 0; u < 5; u++)
    MIXER_PARAMS.forEach((p, i) => { mixerState[u][i] = i2d(preset.mixer[u][i + 1], p); });
  // VP
  for (let n = 0; n < 32; n++) {
    const [onF, srcF, destF, depF, polF] = preset.vp[n];
    vpState[n] = [!!onF, Math.round(srcF), veIdxToDestObj(destF), i2d(depF, VP_PARAMS[3]), Math.round(polF)];
    mapperState[n] = preset.mapper[n].map(pt => [...pt]);  // deep copy
  }

  // Sync UI
  curSlot = 0; curAlgo = algoPerSlot[0];
  document.getElementById('algo-sel').value = curAlgo;
  renderFX(); renderLFO(); renderEG(); renderEF(); renderMixer(); renderVP();
  updateDspDisplay();

  // Send to device
  sendPresetToDevice(preset);
  setStatus('ok', `✓ Loaded: ${preset.filename}`);
}

// Send all preset values with real delays to avoid device buffer overflow.
// Uses async/await + setTimeout for reliable cross-browser timing.
// ALGO_PAUSE_MS: extra wait after Effect Type change (device needs time to switch algo).
// INTERVAL_MS: gap between consecutive SysEx messages.
async function sendPresetToDevice(preset) {
  if (!midiOutput) return;
  const INTERVAL_MS   =  10; // ms between messages
  const ALGO_PAUSE_MS = 200; // extra pause after algo switch

  const sleep = ms => new Promise(r => setTimeout(r, ms));
  let count = 0;

  async function sendVEwait(idx, val) {
    sendVE(idx, val);
    count++;
    await sleep(INTERVAL_MS);
  }

  setStatus('ok', '⏳ Sending preset to device…');

  // FX: set algo first, pause, then send FX params
  for (let s = 0; s < 5; s++) {
    const algo = preset.algos[s];
    await sendVEwait(idxMixer(s, 0), algo);
    await sleep(ALGO_PAUSE_MS); // wait for device to finish algo switch
    for (let i = 0; i < (ALGO_PARAMS[algo] || []).length && i < 30; i++)
      await sendVEwait(idxFX(s, algo, i), preset.fx[s][i]);
  }
  // Mixer p1~8
  for (let u = 0; u < 5; u++)
    for (let p = 1; p < 9; p++) await sendVEwait(idxMixer(u, p), preset.mixer[u][p]);
  // LFO
  for (let u = 0; u < 4; u++)
    for (let i = 0; i < LFO_PARAMS.length; i++) await sendVEwait(idxLFO(u, i), preset.lfo[u][i]);
  // EG
  for (let u = 0; u < 4; u++)
    for (let i = 0; i < EG_PARAMS.length; i++) await sendVEwait(idxEG(u, i), preset.eg[u][i]);
  // EF
  for (let u = 0; u < 2; u++)
    for (let i = 0; i < EF_PARAMS.length; i++) await sendVEwait(idxEF(u, i), preset.ef[u][i]);
  // VP params
  for (let n = 0; n < 32; n++) {
    const [onF, srcF, destF, depF, polF] = preset.vp[n];
    for (const [p, v] of [onF, srcF, destF, depF, polF].entries())
      await sendVEwait(idxVP(n, p), v);
  }
  // VP Mapper (Curve): RemoveAll then Add each point per patch
  for (let n = 0; n < 32; n++) {
    sendVEMapper(0x02, n, 0, 0, 0);  // RemoveAll
    count++;
    await sleep(INTERVAL_MS);
    const pts = preset.mapper[n];
    for (let p = 0; p < pts.length; p++) {
      sendVEMapper(0x7F, n, p, pts[p][0], pts[p][1]);  // Add
      count++;
      await sleep(INTERVAL_MS);
    }
  }

  document.getElementById('tx-log').textContent = `[Load Preset] ${count} params sent`;
  setStatus('ok', `✓ ${preset.filename} — ${count} params sent. Now you can Write on the device.`);
}

function importPresetFiles(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const preset = parsePreset(e.target.result, file.name);
      if (preset) { library.push(preset); renderLibrary(); }
      else alert(`${file.name}: parse failed (expected 10085 bytes)`);
    };
    reader.readAsArrayBuffer(file);
  });
}

function renderLibrary() {
  const list = document.getElementById('lib-list');
  list.innerHTML = '';
  if (library.length === 0) {
    list.innerHTML = '<p class="empty-msg">No presets loaded. Import .preset files above.</p>';
    return;
  }
  library.forEach((preset, idx) => {
    const slots = preset.algos
      .map((a, s) => a ? `<span class="lib-algo">S${s+1}: ${ALGO_NAMES[a]}</span>` : '')
      .filter(Boolean).join('');
    const row = document.createElement('div');
    row.className = 'lib-row';
    row.innerHTML = `
      <div class="lib-info">
        <div class="lib-name">${preset.filename}</div>
        <div class="lib-slots">${slots || '<span class="lib-algo">No Effect</span>'}</div>
      </div>
      <div class="lib-btns">
        <button class="btn" onclick="loadPreset(library[${idx}])">Load</button>
        <button class="btn" style="border-color:#f55;color:#f55;min-width:28px"
          onclick="library.splice(${idx},1);renderLibrary()">✕</button>
      </div>`;
    list.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════
// Tab navigation
// ═══════════════════════════════════════════════════════════
function showTab(id) {
  const order = ['fx','lfo','eg','ef','mixer','vp','lib'];
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', order[i] === id)
  );
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  if (id === 'vp') renderVP();
}

function isVPActive() {
  return document.getElementById('panel-vp')?.classList.contains('active');
}

// ═══════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════
initAlgoSelector();
renderFX();
renderLFO();
renderEG();
renderEF();
renderMixer();
renderVP();
updateDspDisplay();
</script>
